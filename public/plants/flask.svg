<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
<!-- closed bottom (lower-left) glass rim -->
<rect x="3" y="24" width="4" height="2" fill="#7fb8c8"/>
<rect x="3" y="23" width="2" height="1" fill="#7fb8c8"/>
<rect x="4" y="26" width="3" height="1" fill="#7fb8c8"/>

<!-- liquid: stepped staircase from lower-left to upper-right -->
<rect x="5" y="22" width="4" height="4" fill="#2bb39a"/>
<rect x="4" y="23" width="1" height="3" fill="#1d8a76"/>
<rect x="5" y="25" width="4" height="1" fill="#1d8a76"/>

<rect x="7" y="20" width="4" height="4" fill="#2bb39a"/>
<rect x="7" y="23" width="4" height="1" fill="#1d8a76"/>

<rect x="9" y="18" width="4" height="4" fill="#2bb39a"/>
<rect x="9" y="21" width="4" height="1" fill="#1d8a76"/>

<rect x="11" y="16" width="4" height="4" fill="#2bb39a"/>
<rect x="11" y="19" width="4" height="1" fill="#1d8a76"/>

<rect x="13" y="14" width="4" height="4" fill="#2bb39a"/>
<rect x="13" y="17" width="4" height="1" fill="#1d8a76"/>

<rect x="15" y="12" width="4" height="4" fill="#2bb39a"/>
<rect x="15" y="15" width="4" height="1" fill="#1d8a76"/>

<rect x="17" y="10" width="4" height="4" fill="#2bb39a"/>
<rect x="17" y="13" width="4" height="1" fill="#1d8a76"/>

<!-- meniscus / empty glass section near top -->
<rect x="19" y="8" width="4" height="4" fill="#5fe0c4"/>
<rect x="19" y="11" width="4" height="1" fill="#2bb39a"/>
<rect x="21" y="8" width="2" height="2" fill="#cfeaf2"/>

<!-- glass top rim before cap -->
<rect x="21" y="6" width="4" height="3" fill="#cfeaf2"/>
<rect x="20" y="7" width="1" height="2" fill="#7fb8c8"/>

<!-- cap / cork (upper-right) -->
<rect x="23" y="4" width="4" height="4" fill="#3e8a37"/>
<rect x="25" y="3" width="3" height="3" fill="#3e8a37"/>
<rect x="26" y="3" width="2" height="3" fill="#2f6e2b"/>
<rect x="24" y="6" width="3" height="2" fill="#2f6e2b"/>

<!-- glass outline edges (light rim) along upper side -->
<rect x="6" y="21" width="2" height="1" fill="#cfeaf2"/>
<rect x="8" y="19" width="2" height="1" fill="#cfeaf2"/>
<rect x="10" y="17" width="2" height="1" fill="#cfeaf2"/>
<rect x="12" y="15" width="2" height="1" fill="#cfeaf2"/>
<rect x="14" y="13" width="2" height="1" fill="#cfeaf2"/>
<rect x="16" y="11" width="2" height="1" fill="#cfeaf2"/>

<!-- bright white diagonal highlight streak -->
<rect x="7" y="21" width="1" height="1" fill="#ffffff"/>
<rect x="9" y="19" width="1" height="1" fill="#ffffff"/>
<rect x="11" y="17" width="1" height="1" fill="#ffffff"/>
<rect x="13" y="15" width="1" height="1" fill="#ffffff"/>
<rect x="15" y="13" width="1" height="1" fill="#ffffff"/>
<rect x="17" y="11" width="1" height="1" fill="#ffffff"/>
</svg>
